# nginx для «Машина времени: Сахалин».
# Положить в /etc/nginx/sites-available/mashina-vremeni, заменить server_name,
# затем: ln -s ../sites-available/mashina-vremeni /etc/nginx/sites-enabled/ && nginx -t && systemctl reload nginx
# HTTPS выдаётся certbot'ом (см. deploy/README.md) — он сам допишет 443-й блок.

server {
    listen 80;
    server_name ЗАМЕНИТЕ_НА_ДОМЕН;

    # фото гостя с камеры
    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # генерация 3 вариантов занимает до ~5 минут
        proxy_connect_timeout 60s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
    }
}
